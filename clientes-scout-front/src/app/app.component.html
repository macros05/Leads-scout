<ng-container *ngIf="authService.isLoggedIn(); else loginView">
  <div class="flex h-screen bg-gray-100">

    <aside class="w-64 bg-slate-900 text-white hidden md:block">
      <div class="p-6">
        <h1 class="text-xl font-bold tracking-widest text-blue-400">LEAD SCOUT</h1>
        <p class="text-xs text-slate-400">Sales Closer Edition</p>
      </div>
      <nav class="mt-6">
        <a routerLink="/dashboard" class="block py-3 px-6 hover:bg-slate-800 transition">Dashboard</a>
        <a routerLink="/leads" class="block py-3 px-6 hover:bg-slate-800 transition">Business List</a>
        <a routerLink="/scout-search" class="block py-3 px-6 hover:bg-slate-800 transition">Scout Search</a>
      </nav>

      <!-- Logout button -->
      <div class="absolute bottom-0 w-64 p-6">
        <button
          (click)="authService.logout()"
          class="w-full py-2 px-4 text-sm text-slate-400 hover:text-white hover:bg-slate-800 rounded transition text-left">
          Sign out
        </button>
      </div>
    </aside>

    <div class="flex-1 flex flex-col overflow-hidden">
      <main class="flex-1 overflow-x-hidden overflow-y-auto bg-gray-100">
        <div class="container mx-auto px-6 py-8">
          <router-outlet></router-outlet>
        </div>
      </main>
    </div>

  </div>
</ng-container>

<ng-template #loginView>
  <router-outlet></router-outlet>
</ng-template>
